{% extends "base.html" %}
{% block content %}

<h2>📊 Attendance Analytics</h2>

<canvas id="attendanceChart"></canvas>

<script>
new Chart(document.getElementById('attendanceChart'),{
type:'doughnut',
data:{
labels:['Present','Absent'],
datasets:[{data:[{{ presents }},{{ absents }}]}]
}
});
</script>

{% endblock %}
