{% extends "base.html" %}
{% block content %}

<h2>⚠ Defaulter Alert Center</h2>

<table class="table shadow mt-4">
<tr>
<th>Name</th>
<th>Email</th>
<th>Attendance %</th>
<th>Status</th>
</tr>

{% for student in defaulters %}
<tr>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>
<td style="color:red">{{ student.attendance_percentage }}%</td>
<td>
<span class="badge bg-danger">
Alert Email Simulated Sent
</span>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
